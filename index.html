<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistema de Votação Legislativa</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --favor: #27ae60; --contra: #e74c3c; --abst: #f1c40f; --dark: #2c3e50; }
        body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 10px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--dark); margin-bottom: 20px; }
        .titulo-projeto { background: #e8f4fd; border-left: 5px solid #2980b9; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; font-weight: bold; color: #2c3e50; font-size: 1.1rem; }
        .box { display: flex; flex-direction: column; gap: 12px; }
        select, input, button { padding: 15px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; width: 100%; box-sizing: border-box; }
        button { cursor: pointer; background: #2980b9; color: white; border: none; font-weight: bold; }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .nome { font-size: 13px; font-weight: bold; flex: 1; }
        .status { width: 70px; padding: 7px 0; border-radius: 5px; font-size: 9px; text-align: center; background: #eee; color: #aaa; font-weight: bold; border: 1px solid #ddd; }
        .v-favor { background: var(--favor) !important; color: white !important; }
        .v-contra { background: var(--contra) !important; color: white !important; }
        .v-abst { background: var(--abst) !important; color: #333 !important; }
        .hidden { display: none !important; }
        .placar { display: flex; justify-content: space-around; margin-bottom: 15px; background: var(--dark); padding: 12px; border-radius: 8px; color: white; text-align: center; }
        .label-admin { font-size: 12px; font-weight: bold; color: #7f8c8d; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>
<div class="container">
    
    <div id="scr-login">
        <h2>🗳️ Câmara Municipal</h2>
        <div class="box">
            <select id="user-sel">
                <option value="">Selecione seu nome</option>
                <option value="Administrador">⚙️ ADMINISTRADOR</option>
            </select>
            <input type="password" id="user-pass" placeholder="Senha" inputmode="numeric">
            <button onclick="entrar()">ENTRAR NO SISTEMA</button>
        </div>
    </div>

    <div id="scr-voter" class="hidden">
        <div id="proj-voter" class="titulo-projeto">Carregando projeto...</div>
        <h3 id="v-nome" style="text-align: center; color: #7f8c8d;"></h3>
        <div class="box">
            <button onclick="votar('favor')" style="background:var(--favor)">A FAVOR</button>
            <button onclick="votar('contra')" style="background:var(--contra)">CONTRA</button>
            <button onclick="votar('abst')" style="background:var(--abst); color:#333">ABSTENÇÃO</button>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
            <button onclick="location.reload()" style="background:#95a5a6">SAIR / CANCELAR</button>
        </div>
    </div>

    <div id="scr-admin" class="hidden">
        <h2>📊 Painel de Controle</h2>
        
        <div class="box" style="margin-bottom: 25px;">
            <label class="label-admin">TÍTULO DO PROJETO (EDITÁVEL EM TEMPO REAL):</label>
            <input type="text" id="input-titulo" placeholder="Digite o nome do projeto aqui..." oninput="atualizarTitulo(this.value)" style="border: 2px solid #2980b9; background: #f7fbff;">
        </div>

        <div class="placar">
            <div>Favor <span id="p-f" style="display:block; font-size:20px; font-weight:bold;">0</span></div>
            <div>Contra <span id="p-c" style="display:block; font-size:20px; font-weight:bold;">0</span></div>
            <div>Abst. <span id="p-a" style="display:block; font-size:20px; font-weight:bold;">0</span></div>
        </div>

        <div id="v-lista"></div>

        <div class="box" style="margin-top: 25px;">
            <button onclick="zerarVotos()" style="background:#c0392b">LIMPAR VOTOS (NOVA VOTAÇÃO)</button>
            <button onclick="sairAdmin()" style="background:var(--dark)">FECHAR PAINEL E SAIR</button>
        </div>
    </div>
</div>

<script>
    const config = {
        apiKey: "AIzaSyB91CuEck7Fal0ItD3H17ynYap34iNTI-g",
        authDomain: "votacao-bc712.firebaseapp.com",
        databaseURL: "https://votacao-bc712-default-rtdb.firebaseio.com",
        projectId: "votacao-bc712",
        storageBucket: "votacao-bc712.firebasestorage.app",
        messagingSenderId: "645708138467",
        appId: "1:645708138467:web:79dabb377489ada8a002d6"
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    const legs = {
        "Antônio Geraldo Martins (PDT)": "120", "Cleunice Aparecida de Souza (Cidadania)": "230",
        "Claudete da Luz de Oliveira Farias (MDB)": "150", "Luís Fernando Oliveira de Souza (PDT)": "125",
        "Luiz Carlos de Oliveira (MDB)": "156", "Jean da Silva (MDB)": "151",
        "Kristian Costa Andrade (Podemos)": "205", "Pedro William Velho (MDB)": "156",
        "Rodrigo Barth Pereira (MDB)": "152", "Renildo de Souza (PL)": "224",
        "Valdecir de Liz (PDT)": "127", "Administrador": "admin2026"
    };

    const sel = document.getElementById('user-sel');
    Object.keys(legs).forEach(n => { if(n !== "Administrador") { let o = document.createElement('option'); o.value = n; o.text = n; sel.appendChild(o); } });

    function entrar() {
        const u = sel.value, p = document.getElementById('user-pass').value;
        if(legs[u] === p) {
            window.user = u; 
            document.getElementById('scr-login').classList.add('hidden');
            if(u === "Administrador") { 
                document.getElementById('scr-admin').classList.remove('hidden'); 
                monitorarAdmin(); 
            } else { 
                document.getElementById('scr-voter').classList.remove('hidden'); 
                document.getElementById('v-nome').innerText = u;
                ouvirTitulo(); 
            }
        } else alert("Senha incorreta");
    }

    // --- FUNÇÕES DO ADMINISTRADOR ---
    function atualizarTitulo(val) {
        db.ref('configuracao/titulo').set(val);
    }

    function monitorarAdmin() {
        // Carrega o título atual no input
        db.ref('configuracao/titulo').on('value', s => {
            if(s.val()) document.getElementById('input-titulo').value = s.val();
        });

        // Monitora os votos
        db.ref('votos').on('value', s => {
            const data = s.val() || {}; const lista = document.getElementById('v-lista');
            lista.innerHTML = ""; let f=0, c=0, a=0;
            Object.keys(legs).forEach(n => {
                if(n === "Administrador") return;
                const v = data[n.replace(/[^a-zA-Z]/g, "")] || "";
                if(v==='favor') f++; if(v==='contra') c++; if(v==='abst') a++;
                lista.innerHTML += `<div class="row"><span class="nome">${n}</span><div class="indicadores">
                    <div class="status ${v==='favor'?'v-favor':''}">A FAVOR</div>
                    <div class="status ${v==='contra'?'v-contra':''}">CONTRA</div>
                    <div class="status ${v==='abst'?'v-abst':''}">ABST.</div></div></div>`;
            });
            document.getElementById('p-f').innerText = f; document.getElementById('p-c').innerText = c; document.getElementById('p-a').innerText = a;
        });
    }

    function zerarVotos() { if(confirm("Deseja zerar todos os votos para uma nova rodada?")) db.ref('votos').remove(); }
    
    function sairAdmin() { location.reload(); }

    // --- FUNÇÕES DO VEREADOR ---
    function ouvirTitulo() {
        db.ref('configuracao/titulo').on('value', s => {
            document.getElementById('proj-voter').innerText = s.val() || "Nenhum projeto em votação";
        });
    }

    function votar(t) {
        const id = window.user.replace(/[^a-zA-Z]/g, "");
        db.ref('votos/' + id).set(t).then(() => { 
            alert("Voto registrado com sucesso!"); 
        });
    }
</script>
</body>
</html>
